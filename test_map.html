<!DOCTYPE html>
<html>
  <head>
    <title>Raw Map Test</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&callback=initMap" async defer></script>
    <script>
      function initMap() {
        console.log("Map initialized successfully!");
        const map = new google.maps.Map(document.getElementById("map"), {
          center: { lat: -34.397, lng: 150.644 },
          zoom: 8,
        });
      }
    </script>
  </head>
  <body>
    <h1>Raw Google Maps API Test</h1>
    <div id="map" style="height: 400px; width: 100%; background-color: grey;"></div>
  </body>
</html>
